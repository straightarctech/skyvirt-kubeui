<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SkyVirt KubeUI">
  <title>SkyVirt KubeUI</title>
  <defs>
    <linearGradient id="ku-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- rounded badge -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#ku-g)"/>
  <!-- isometric cube (node) rendered as filled paths so it needs no font -->
  <g fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
    <path d="M128 56 L196 94 V162 L128 200 L60 162 V94 Z"/>
    <path d="M128 128 L196 94"/>
    <path d="M128 128 V200"/>
    <path d="M128 128 L60 94"/>
  </g>
  <!-- vertex nodes -->
  <g fill="#ffffff">
    <circle cx="128" cy="56" r="10"/>
    <circle cx="196" cy="162" r="10"/>
    <circle cx="60" cy="162" r="10"/>
  </g>
</svg>
